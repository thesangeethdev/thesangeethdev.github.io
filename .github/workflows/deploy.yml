name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Copy productionExeculables to docs
        run: |
          rm -rf docs/*
          mkdir -p docs
          cp -r webApp/build/dist/wasmJs/productionExecutable/* docs/
