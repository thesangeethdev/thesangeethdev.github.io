name: Update Docs

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Copy productionExecutable to docs
        run: |
          rm -rf docs/*
          mkdir -p docs
          cp -a webApp/build/dist/wasmJs/productionExecutable/. docs/