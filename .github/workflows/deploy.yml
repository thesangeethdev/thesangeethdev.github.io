name: Update Docs

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Copy productionExecutable to docs
        run: |
          rm -rf docs/*
          mkdir -p docs
          cp -a webApp/build/dist/wasmJs/productionExecutable/. docs/

      - name: Commit and push docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs
          git commit -m "Update docs" || echo "No changes"

          git pull --rebase origin main
          git push