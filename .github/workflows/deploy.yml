name: Update Docs

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Copy productionExecutable to docs
        run: |
          rm -rf docs/*
          mkdir -p docs
          cp -a webApp/build/dist/wasmJs/productionExecutable/. docs/

      - name: Push docs changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          git commit -m "Update website files" || exit 0
          git push